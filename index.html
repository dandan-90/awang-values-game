<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>阿旺的价值观之旅 - 三旺通信</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#5C94FC;display:flex;justify-content:center;align-items:center;min-height:100vh;min-height:100dvh;font-family:'Noto Sans SC',sans-serif;overflow:hidden;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;}
#game-wrapper{position:relative;box-shadow:0 8px 40px rgba(0,0,0,.35),0 0 0 3px #4A6BCC;border-radius:12px;overflow:hidden;width:960px;height:640px;max-width:100vw;max-height:100vh;max-height:100dvh;}
canvas{display:block;border-radius:12px;width:100%!important;height:100%!important;}
/* Touch controls — hidden on desktop, visible on touch devices */
#touch-controls{display:none;position:absolute;inset:0;z-index:10;pointer-events:none;}
#touch-controls.active{display:block;}
/* Virtual Joystick */
#joystick-zone{position:absolute;left:0;bottom:0;width:45%;height:70%;pointer-events:auto;touch-action:none;}
#joystick-base{position:absolute;left:22%;bottom:24%;width:21vw;height:21vw;max-width:110px;max-height:110px;border-radius:50%;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.3);pointer-events:none;transform:translate(-50%,-50%);}
#joystick-thumb{position:absolute;width:11vw;height:11vw;max-width:55px;max-height:55px;border-radius:50%;background:rgba(255,255,255,.35);border:2px solid rgba(255,255,255,.6);pointer-events:none;transform:translate(-50%,-50%);transition:background .1s;}
#joystick-thumb.active{background:rgba(255,255,255,.6);border-color:#FFF;box-shadow:0 0 12px rgba(255,255,255,.3);}
/* Jump button */
.touch-btn{position:absolute;border-radius:50%;pointer-events:auto;touch-action:none;transition:background .1s;-webkit-tap-highlight-color:transparent;}
.touch-btn.pressed{background:rgba(255,255,255,.55)!important;border-color:#FFF!important;}
.btn-jump{right:14%;bottom:20%;width:20vw;height:20vw;max-width:110px;max-height:110px;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;}
.btn-label{font-size:clamp(14px,3vw,22px);font-weight:700;color:#FFF;text-shadow:0 1px 3px rgba(0,0,0,.5);}
.ctrl-hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.45);font-size:10px;font-family:'Noto Sans SC',sans-serif;pointer-events:none;text-align:center;width:100%;}
.kb-hint{display:block;}
@media(hover:hover)and(pointer:fine){.kb-hint{display:block}.ctrl-hint{display:none}}
@media(hover:none)and(pointer:coarse){.kb-hint{display:none}.ctrl-hint{display:block}}
</style>
</head>
<body>
<div id="game-wrapper">
<canvas id="game"></canvas>
<div id="touch-controls">
  <!-- Virtual Joystick -->
  <div id="joystick-zone">
    <div id="joystick-base"><div id="joystick-thumb"></div></div>
  </div>
  <!-- Jump button -->
  <div class="touch-btn btn-jump" data-key=" "><span class="btn-label">Jump</span></div>
  <div class="ctrl-hint">👆 左侧滑动控制方向 | 右侧 Jump 跳跃/确认</div>
</div>
</div>
<script>
// ═══════════════════════════════════════════════════
//  阿旺的价值观之旅 v5.1 — PC+移动端双端支持
// ═══════════════════════════════════════════════════
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const W=960,H=640;canvas.width=W;canvas.height=H;

let actx=null;
function audioCtx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
function beep(freq,dur,type='square',vol=.06){try{const a=audioCtx(),o=a.createOscillator(),g=a.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(vol,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+dur);o.connect(g);g.connect(a.destination);o.start(a.currentTime);o.stop(a.currentTime+dur)}catch(e){}}
function sfxJump(){beep(300,.08,'square',.05);beep(500,.12,'square',.04)}
function sfxCollect(){beep(600,.06,'square',.06);setTimeout(()=>beep(900,.08,'square',.06),60);setTimeout(()=>beep(1200,.1,'square',.05),120)}
function sfxHit(){beep(120,.15,'sawtooth',.07);beep(80,.2,'sawtooth',.06)}
function sfxStomp(){beep(200,.06,'square',.05);beep(400,.1,'square',.06)}
function sfxWin(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.2,'square',.06),i*120))}
function sfxDeath(){[400,300,200,100].forEach((f,i)=>setTimeout(()=>beep(f,.15,'sawtooth',.08),i*100))}
function sfxClick(){beep(800,.04,'square',.03)}

const S={MENU:'menu',L1_INTRO:'l1_intro',L1:'l1',L1_DONE:'l1_done',L2_INTRO:'l2_intro',L2:'l2',L2_DONE:'l2_done',WIN:'win'};
let gs=S.MENU,st=0,ta=1,gt=0;

const keys={};
window.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;keys[e.code]=true;e.preventDefault()});
window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;keys[e.code]=false});

// ════════════════════════════════
//  TOUCH & MOBILE SUPPORT (Virtual Joystick)
// ════════════════════════════════
const isMobile=/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)||('ontouchstart' in window);
const tcEl=document.getElementById('touch-controls');
const wrapperEl=document.getElementById('game-wrapper');
if(isMobile||!window.matchMedia('(hover:hover) and (pointer:fine)').matches){tcEl.classList.add('active');}

// Canvas auto-scale
function scaleCanvas(){
  const vw=window.innerWidth,vh=window.innerHeight;
  const scale=Math.min(vw/960,vh/640);
  wrapperEl.style.width=(960*scale)+'px';
  wrapperEl.style.height=(640*scale)+'px';
}
scaleCanvas();window.addEventListener('resize',scaleCanvas);window.addEventListener('orientationchange',()=>setTimeout(scaleCanvas,200));

// ── Virtual Joystick ──
const jZone=document.getElementById('joystick-zone');
const jThumb=document.getElementById('joystick-thumb');
const jBase=document.getElementById('joystick-base');
let jId=null; // touch id currently controlling joystick
let jCX=0,jCY=0; // center of joystick (in wrapper-relative px)
let jMaxR=55; // max thumb travel radius (px, updated on resize)

function updateJoystickMetrics(){
  const br=jBase.getBoundingClientRect();
  jCX=br.left+br.width/2; jCY=br.top+br.height/2;
  jMaxR=br.width*.45;
}
updateJoystickMetrics();window.addEventListener('resize',updateJoystickMetrics);

function updateKeysFromJoystick(dx,dy){
  const dead=.2; // dead zone threshold
  const ax=Math.abs(dx)/jMaxR,ay=Math.abs(dy)/jMaxR;
  // Horizontal: require exceeding dead zone
  if(ax>dead){keys['a']=dx<0;keys['arrowleft']=dx<0;keys['d']=dx>0;keys['arrowright']=dx>0;}
  else{keys['a']=keys['arrowleft']=keys['d']=keys['arrowright']=false;}
  // Vertical: require exceeding dead zone (but don't override jump button)
  if(ay>dead){keys['w']=dy<0;keys['arrowup']=dy<0;keys['s']=dy>0;keys['arrowdown']=dy>0;}
  else{keys['w']=keys['arrowup']=keys['s']=keys['arrowdown']=false;}
}

function clearJoystickKeys(){
  keys['a']=keys['arrowleft']=keys['d']=keys['arrowright']=false;
  keys['w']=keys['arrowup']=keys['s']=keys['arrowdown']=false;
}

jZone.addEventListener('touchstart',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(jId!==null)continue; // already controlled
    jId=t.identifier; updateJoystickMetrics();
    jThumb.style.left=jCX+'px'; jThumb.style.top=jCY+'px';
    jThumb.classList.add('active');
  }
},{passive:false});

jZone.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier!==jId)continue;
    const dx=t.clientX-jCX, dy=t.clientY-jCY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const clampDist=Math.min(dist,jMaxR);
    const nx=dist>0?(dx/dist)*clampDist:0, ny=dist>0?(dy/dist)*clampDist:0;
    jThumb.style.left=(jCX+nx)+'px'; jThumb.style.top=(jCY+ny)+'px';
    updateKeysFromJoystick(nx,ny);
  }
},{passive:false});

jZone.addEventListener('touchend',e=>{
  for(const t of e.changedTouches){
    if(t.identifier===jId){
      jId=null; jThumb.classList.remove('active');
      jThumb.style.left=jCX+'px'; jThumb.style.top=jCY+'px';
      clearJoystickKeys();
    }
  }
});
jZone.addEventListener('touchcancel',e=>{jId=null;jThumb.classList.remove('active');jThumb.style.left=jCX+'px';jThumb.style.top=jCY+'px';clearJoystickKeys();});

// ── Jump / Confirm button (traditional tap button) ──
const btnJump=document.querySelector('.btn-jump');
if(btnJump){
  btnJump.addEventListener('touchstart',e=>{
    e.preventDefault();btnJump.classList.add('pressed');keys[' ']=true;
  });
  btnJump.addEventListener('touchend',e=>{
    e.preventDefault();btnJump.classList.remove('pressed');keys[' ']=false;
  });
  btnJump.addEventListener('touchcancel',e=>{
    btnJump.classList.remove('pressed');keys[' ']=false;
  });
}
// Mobile: tap canvas for menu confirm (space + enter)
if(isMobile){canvas.addEventListener('click',()=>{keys[' ']=true;keys['enter']=true;setTimeout(()=>{keys[' ']=false;keys['enter']=false},120);});}
else{canvas.addEventListener('click',()=>{keys[' ']=true;setTimeout(()=>keys[' ']=false,100)});}

function lerp(a,b,t){return a+(b-a)*t}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}
function rand(a,b){return a+Math.random()*(b-a)}
function randi(a,b){return Math.floor(rand(a,b+1))}

class Particle{constructor(x,y,vx,vy,color,life,size=3){this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.color=color;this.life=life;this.maxLife=life;this.size=size}
  update(dt){this.x+=this.vx*dt;this.y+=this.vy*dt;this.vy+=300*dt;this.life-=dt}get alive(){return this.life>0}get alpha(){return clamp(this.life/this.maxLife*2,0,1)}}
let parts=[];
function spawnParts(x,y,cnt,color,life=.8){for(let i=0;i<cnt;i++){const a=Math.random()*Math.PI*2,s=60+Math.random()*200;parts.push(new Particle(x,y,Math.cos(a)*s,Math.sin(a)*s-80,color,life+Math.random()*.3,2+Math.random()*3))}}

let shakeX=0,shakeY=0,shakeT=0,shakeI=0;
function shake(dur=.15,int=6){shakeT=dur;shakeI=int}
function updShake(dt){shakeX=shakeY=0;if(shakeT>0){shakeT-=dt;shakeX=(Math.random()-.5)*shakeI*2;shakeY=(Math.random()-.5)*shakeI*2}}

// ════════════════════════════════
//  PLAYER (阿旺) — Canvas精绘
// ════════════════════════════════
class Player{
  constructor(x,y){this.x=x;this.y=y;this.w=38;this.h=50;this.vx=0;this.vy=0;this.speed=280;this.jForce=-560;this.grav=1350;this.grounded=false;this.facing=1;this.wc=0;this.squash=1;this.stretch=1;this.inv=0;this.hp=5;this.maxHp=5;this.acd=0;this.bobY=0;this.ability=null;this.abilityTimer=0;this.shieldHP=0;this.speedMult=1}
  update(dt,plats){
    const md=(keys['d']||keys['arrowright']?1:0)-(keys['a']||keys['arrowleft']?1:0);
    if(md!==0)this.facing=md>0?1:-1;this.vx=md*this.speed*this.speedMult;this.vy+=this.grav*dt;
    if((keys['w']||keys['arrowup']||keys[' '])&&this.grounded){this.vy=this.jForce;this.grounded=false;sfxJump()}
    this.vy=Math.min(this.vy,800);this.x+=this.vx*dt;this.y+=this.vy*dt;this.grounded=false;
    for(const p of plats){const px=this.x+5,pw=this.w-10;if(px+pw>p.x&&px<p.x+p.w&&this.y+this.h>=p.y&&this.y+this.h-this.vy*dt<=p.y+12){this.y=p.y-this.h;this.vy=0;this.grounded=true}}
    if(this.y+this.h>580){this.y=580-this.h;this.vy=0;this.grounded=true}if(this.y<0){this.y=0;this.vy=0}
    if(md!==0&&this.grounded)this.wc+=dt*8;else if(this.grounded)this.wc*=.85;
    const ts=this.grounded?1:.82;this.squash=lerp(this.squash,ts,.2);this.stretch=lerp(this.stretch,1/ts,.2);
    if(this.inv>0)this.inv-=dt;if(this.acd>0)this.acd-=dt;
    this.bobY=this.grounded&&md===0?Math.sin(gt*2.5)*2:0;
    // Ability timer
    if(this.abilityTimer>0){this.abilityTimer-=dt;if(this.abilityTimer<=0){this.ability=null;this.abilityTimer=0;this.shieldHP=0;this.speedMult=1}}
  }
  draw(ctx,camX=0,camY=0,viewMode='side'){
    const sx=this.x-camX,sy=this.y-camY,cx=sx+this.w/2,cy=sy+this.h/2;
    ctx.save();ctx.translate(cx,cy+this.bobY);
    const sc=this.squash,st=this.stretch;
    const flash=this.inv>0&&Math.floor(this.inv*20)%2===0;
    if(viewMode==='topdown'){
      ctx.scale(st,sc);if(flash)ctx.globalAlpha=.5;
      this._drawTopDown(ctx);
    }else if(viewMode==='front'){
      ctx.scale(this.facing*st,sc);if(flash)ctx.globalAlpha=.5;
      this._drawFront(ctx);
    }else{
      ctx.scale(this.facing*st,sc);if(flash)ctx.globalAlpha=.5;
      this._drawSide(ctx);
    }
    ctx.restore();
  }
  _drawShadow(ctx,dy,sy){
    ctx.fillStyle='rgba(0,0,0,.18)';ctx.beginPath();ctx.ellipse(0,dy+sy,16,5,0,0,Math.PI*2);ctx.fill();
  }
  _drawAntenna(ctx){
    // Antenna wire with arc
    ctx.strokeStyle='#2962AF';ctx.lineWidth=2.5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(0,-24);ctx.quadraticCurveTo(4,-34,2,-40);ctx.stroke();
    // Antenna glow ball
    const ag=ctx.createRadialGradient(2,-40,1,2,-40,8);
    ag.addColorStop(0,'rgba(160,220,255,.95)');ag.addColorStop(.5,'rgba(74,144,217,.5)');ag.addColorStop(1,'transparent');
    ctx.fillStyle=ag;ctx.beginPath();ctx.arc(2,-40,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#80D4FF';ctx.beginPath();ctx.arc(2,-40,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(0,-42,1.8,0,Math.PI*2);ctx.fill();
  }
  _drawHeadphones(ctx){
    // Left headphone
    ctx.fillStyle='#1A4A8A';ctx.beginPath();ctx.roundRect(-17,-18,7,12,3);ctx.fill();
    ctx.fillStyle='#2962AF';ctx.beginPath();ctx.roundRect(-19,-19,11,8,3);ctx.fill();
    ctx.fillStyle='#1A4A8A';ctx.beginPath();ctx.arc(-13.5,-13,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#3A7CC3';ctx.beginPath();ctx.arc(-13.5,-13,3.5,0,Math.PI*2);ctx.fill();
    // Right headphone
    ctx.fillStyle='#1A4A8A';ctx.beginPath();ctx.roundRect(10,-18,7,12,3);ctx.fill();
    ctx.fillStyle='#2962AF';ctx.beginPath();ctx.roundRect(8,-19,11,8,3);ctx.fill();
    ctx.fillStyle='#1A4A8A';ctx.beginPath();ctx.arc(13.5,-13,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#3A7CC3';ctx.beginPath();ctx.arc(13.5,-13,3.5,0,Math.PI*2);ctx.fill();
    // Headband
    ctx.strokeStyle='#1A4A8A';ctx.lineWidth=3.5;ctx.lineCap='butt';
    ctx.beginPath();ctx.arc(0,-15,13,Math.PI*1.15,-Math.PI*0.15);ctx.stroke();
  }
  _drawBody(ctx,showDetails){
    // Body shadow
    ctx.fillStyle='rgba(0,0,0,.12)';ctx.beginPath();ctx.ellipse(0,20,17,6,0,0,Math.PI*2);ctx.fill();
    // Main body (rounded square, blue)
    const bg=ctx.createLinearGradient(0,8,0,26);
    bg.addColorStop(0,'#5BA0E8');bg.addColorStop(.3,'#4A90D9');bg.addColorStop(.7,'#3D7CC6');bg.addColorStop(1,'#2962AF');
    ctx.fillStyle=bg;ctx.beginPath();ctx.roundRect(-15,8,30,19,8);ctx.fill();
    // Body outline
    ctx.strokeStyle='#1A4A8A';ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(-15,8,30,19,8);ctx.stroke();
    // Body top highlight
    ctx.fillStyle='rgba(255,255,255,.15)';ctx.beginPath();ctx.roundRect(-13,9,26,5,5);ctx.fill();
    // Belly panel (white)
    ctx.fillStyle='#F5F8FF';ctx.beginPath();ctx.roundRect(-11,10.5,22,14.5,5);ctx.fill();
    ctx.strokeStyle='#C8D4E0';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(-11,10.5,22,14.5,5);ctx.stroke();
    if(!showDetails)return;
    // LED strip (8 tiny lights)
    const leds=['#4FC3F7','#81C784','#FFD54F','#FF8A65','#CE93D8','#EF5350','#FFB74D','#4DD0E1'];
    for(let i=0;i<8;i++){const lx=-9+i*2.6,a=.4+Math.sin(gt*4+i*.8)*.4;ctx.globalAlpha=a*.8+.15;ctx.fillStyle=leds[i];ctx.beginPath();ctx.roundRect(lx,12,2,1.5,1);ctx.fill()}ctx.globalAlpha=1;
    // 4x RJ45 ports
    for(let i=0;i<4;i++){const px=-6.5+i*4,py=15.8;
      ctx.fillStyle='#37474F';ctx.beginPath();ctx.roundRect(px,py,3.8,7,1);ctx.fill();
      ctx.fillStyle='#1A1A2E';ctx.beginPath();ctx.roundRect(px+.4,py+.4,3,6.2,.8);ctx.fill();
      ctx.fillStyle='#FFD700';for(let j=0;j<4;j++)ctx.fillRect(px+.7,py+1.3+j*1.3,1.8,.5);
      const lOn=Math.sin(gt*3+i)*.5+.5>.3;ctx.fillStyle=lOn?'#4CAF50':'#1B5E20';ctx.beginPath();ctx.arc(px-.6,py+3,.8,0,Math.PI*2);ctx.fill()}
  }
  _drawArms(ctx,swing){
    // Left arm
    ctx.fillStyle='#4A90D9';ctx.beginPath();ctx.roundRect(-19.5,4+swing*.4,6.5,15,3.5);ctx.fill();
    ctx.fillStyle='#2962AF';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(-19.5,4+swing*.4,6.5,15,3.5);ctx.stroke();
    ctx.fillStyle='#6BB2F0';ctx.fillRect(-18.5,4.5+swing*.4,3,3);
    ctx.fillStyle='#F5F8FF';ctx.beginPath();ctx.roundRect(-19,16+swing*.4,6,4,2);ctx.fill();
    // Right arm
    ctx.fillStyle='#4A90D9';ctx.beginPath();ctx.roundRect(13,4-swing*.4,6.5,15,3.5);ctx.fill();
    ctx.fillStyle='#2962AF';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(13,4-swing*.4,6.5,15,3.5);ctx.stroke();
    ctx.fillStyle='#6BB2F0';ctx.fillRect(15.5,4.5-swing*.4,3,3);
    ctx.fillStyle='#F5F8FF';ctx.beginPath();ctx.roundRect(13,16-swing*.4,6,4,2);ctx.fill();
  }
  _drawLegs(ctx,lOff){
    ctx.fillStyle='#3578BD';
    ctx.beginPath();ctx.roundRect(-9,25.5,8,7.5,2.5);ctx.fill();
    ctx.beginPath();ctx.roundRect(1,25.5,8,7.5,2.5);ctx.fill();
    ctx.fillStyle='#FFF';ctx.beginPath();ctx.roundRect(-9+lOff*.3,32.5,10,3.5,2);ctx.fill();
    ctx.beginPath();ctx.roundRect(-1-lOff*.3,32.5,10,3.5,2);ctx.fill();
  }
  _drawFace(ctx){
    // Face panel
    ctx.fillStyle='#F5F8FF';ctx.beginPath();ctx.roundRect(-10,-16,20,17,5);ctx.fill();
    ctx.strokeStyle='#C8D4E0';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(-10,-16,20,17,5);ctx.stroke();
    // Face highlight
    ctx.fillStyle='rgba(255,255,255,.3)';ctx.beginPath();ctx.roundRect(-9,-15,18,7,4);ctx.fill();
    // Eyes
    ctx.fillStyle='#1B3A5C';ctx.beginPath();ctx.arc(-4.5,-9,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(4.5,-9,4,0,Math.PI*2);ctx.fill();
    // Eye highlights
    ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(-3.5,-10.5,1.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(5.5,-10.5,1.5,0,Math.PI*2);ctx.fill();
    // Blush
    ctx.fillStyle='rgba(255,150,170,.4)';ctx.beginPath();ctx.ellipse(-7.5,-4.5,3.5,2.2,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(7.5,-4.5,3.5,2.2,0,0,Math.PI*2);ctx.fill();
    // Mouth
    ctx.strokeStyle='#1B3A5C';ctx.lineWidth=1.3;ctx.beginPath();ctx.arc(0,-1.5,3.5,.15,Math.PI-.15);ctx.stroke();
  }
  _drawHead(ctx){
    // Head shadow
    ctx.fillStyle='rgba(0,0,0,.08)';ctx.beginPath();ctx.ellipse(0,8,16,4,0,0,Math.PI*2);ctx.fill();
    // Main head (rounded square, blue)
    const hg=ctx.createLinearGradient(0,-21,0,8);
    hg.addColorStop(0,'#6BB2F0');hg.addColorStop(.3,'#4A90D9');hg.addColorStop(.7,'#3D7CC6');hg.addColorStop(1,'#2962AF');
    ctx.fillStyle=hg;ctx.beginPath();ctx.roundRect(-15,-21,30,29,10);ctx.fill();
    ctx.strokeStyle='#1A4A8A';ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(-15,-21,30,29,10);ctx.stroke();
    // Head highlight arc
    ctx.fillStyle='rgba(255,255,255,.12)';ctx.beginPath();ctx.roundRect(-12,-19,24,10,8);ctx.fill();
  }
  _drawSide(ctx){
    // Ability glow behind player

class L2Bullet{constructor(x,y,vx,vy,color='#FF0',isEnemy=false){this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.w=4;this.h=8;this.color=color;this.isEnemy=isEnemy}
  update(dt){this.x+=this.vx*dt;this.y+=this.vy*dt}get alive(){return this.y>-20&&this.y<H+20&&this.x>-20&&this.x<W+20}
  draw(ctx){if(this.isEnemy){ctx.fillStyle='#FF4444';ctx.beginPath();ctx.arc(this.x,this.y,4,0,Math.PI*2);ctx.fill()}else{ctx.fillStyle='#FFF';ctx.fillRect(this.x-1,this.y-5,2,10);ctx.fillStyle=this.color;ctx.fillRect(this.x-2,this.y-8,4,4)}}}

class L2EnemyShip{constructor(x,y,type='normal'){this.x=x;this.y=y;this.w=28;this.h=28;this.type=type;this.hp=type==='boss'?20:1;this.maxHp=this.hp;this.sp=type==='boss'?30:35+rand(0,50);this.mode=type==='boss'?'boss':randi(0,2);this.timer=0;this.shootCD=0}
  update(dt,bullets){
    this.y+=this.sp*dt;this.timer+=dt;
    if(this.mode==='weave')this.x+=Math.sin(this.timer*3.5)*70*dt;
    else if(this.mode==='zigzag'&&this.timer>.15)this.x+=(Math.sin(this.timer*5)*100)*dt;
    else if(this.mode==='boss'){this.x+=Math.sin(this.timer*1.3)*50*dt;this.y=clamp(this.y,25,180)}
    this.x=clamp(this.x,15,W-15-this.w);this.shootCD-=dt;
    if((this.type==='boss'&&this.shootCD<=0)||(this.type!=='boss'&&this.shootCD<=0&&Math.random()<.008)){
      if(this.type==='boss'){for(let a=-.2;a<=.2;a+=.08)bullets.push(new L2Bullet(this.x+this.w/2,this.y+this.h,Math.sin(a)*60,100,'#FF4444',true));this.shootCD=.5}
      else if(Math.random()<.25){bullets.push(new L2Bullet(this.x+this.w/2,this.y+this.h,0,140,'#FF4444',true));this.shootCD=1.8}}
  }
  get alive(){return this.y<H+60&&this.y>-60&&this.x<W+60&&this.x>-60}
  draw(ctx){if(this.hp<=0)return;
    if(this.type==='boss'){ctx.fillStyle='#8B0000';ctx.fillRect(this.x-3,this.y-3,this.w+6,this.h+6);ctx.fillStyle='#E74C3C';ctx.fillRect(this.x,this.y,this.w,this.h);ctx.fillStyle='#FFD700';ctx.beginPath();ctx.moveTo(this.x+3,this.y-4);ctx.lineTo(this.x+7,this.y-14);ctx.lineTo(this.x+14,this.y-5);ctx.lineTo(this.x+21,this.y-14);ctx.lineTo(this.x+25,this.y-4);ctx.fill();ctx.fillStyle='#333';ctx.fillRect(this.x,this.y-20,this.w,6);ctx.fillStyle='#E74C3C';ctx.fillRect(this.x,this.y-20,this.w*(this.hp/this.maxHp),6);ctx.fillStyle='#FFF';ctx.font='8px sans-serif';ctx.textAlign='center';ctx.fillText('BOSS',this.x+this.w/2,this.y-22)}
    else{ctx.fillStyle='#4A2800';ctx.beginPath();ctx.arc(this.x+14,this.y+14,14,0,Math.PI*2);ctx.fill();ctx.fillStyle='#7A4A20';ctx.beginPath();ctx.arc(this.x+14,this.y+14,11,0,Math.PI*2);ctx.fill();ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(this.x+8,this.y+10,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(this.x+20,this.y+10,3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#000';ctx.beginPath();ctx.arc(this.x+9,this.y+11,1.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(this.x+21,this.y+11,1.5,0,Math.PI*2);ctx.fill()}}}

class L2TreasureDrop{constructor(x,y,idx,data){this.x=x;this.y=y;this.w=46;this.h=46;this.idx=idx;this.data=data;this.collected=false;this.anim=0;this.life=12}
  update(dt){if(this.collected)this.anim+=dt*3;else this.life-=dt}
  draw(ctx){if(this.life<=0||(this.collected&&this.anim>1))return;ctx.save();ctx.globalAlpha=this.collected?1-this.anim:clamp(this.life/3,0,1);const g=ctx.createRadialGradient(this.x+23,this.y+23,5,this.x+23,this.y+23,30);g.addColorStop(0,'#FFF');g.addColorStop(.4,this.data.color);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.beginPath();ctx.arc(this.x+23,this.y+23,30,0,Math.PI*2);ctx.fill();ctx.fillStyle=this.data.color;ctx.beginPath();ctx.arc(this.x+23,this.y+23,19,0,Math.PI*2);ctx.fill();ctx.fillStyle='#FFF';ctx.font='bold 10px "Noto Sans SC"';ctx.textAlign='center';ctx.fillText('⭐'+this.data.name,this.x+23,this.y-3);ctx.restore();
    if(this.collected){ctx.save();ctx.globalAlpha=1-this.anim;ctx.translate(this.x+23,this.y+23);ctx.scale(1+this.anim*2,1+this.anim*2);ctx.fillStyle=this.data.color;ctx.font='bold 20px "Noto Sans SC"';ctx.textAlign='center';ctx.fillText(this.data.name,0,7);ctx.restore()}}}

class Level2{
  constructor(){
    this.player={x:W/2-18,y:H-110,w:36,h:48,speed:320,invinv:0,hp:5,maxHp:5,ability:null,abilityTimer:0,fireMult:1,homing:false};
    this.bullets=[];this.enemies=[];this.drops=[];
    this.wave=1;this.waveEnemies=5;this.waveSpawned=0;this.spawnCD=0;
    this.tc=[false,false,false,false];this.col=0;this.done=false;
    this.msg='第 1 波！消灭敌人收集宝物！';this.msgT=2.5;
    this.bossActive=false;this.bossDefeated=false;this.killCount=0;this.killsPerDrop=4;
    this.fireTimer=0;this.bgStars=[];
    for(let i=0;i<130;i++){
      this.bgStars.push({
        x:Math.random()*W,y:Math.random()*H,
        s:1+Math.random()*3,a:.3+Math.random()*.5
      });
    }
  }
  _reset(){
    this.player.hp=this.player.maxHp;
    this.player.inv=2;
    this.player.x=W/2-18;this.player.y=H-110;
    this.player.ability=null;this.player.abilityTimer=0;this.player.fireMult=1;this.player.homing=false;
    this.bullets.length=0;this.enemies.length=0;this.drops.length=0;
    this.wave=1;this.waveEnemies=5;this.waveSpawned=0;this.spawnCD=0;
    this.killCount=0;this.bossActive=false;this.bossDefeated=false;
    this.msg='重新出击！';this.msgT=2;
    sfxDeath();
  }
  _spawnEnemy(){
    const ex=rand(30,W-60),ey=-35;
    const r=rand(0,1);
    const type=r<.7?'normal':r<.85?'weave':'zigzag';
    this.enemies.push(new L2EnemyShip(ex,ey,type));
    this.waveSpawned++;
  }
  _checkBulletHit(e,b){
    if(b.isEnemy)return false;
    var dx=Math.abs(b.x-e.x-e.w/2);
    var dy=Math.abs(b.y-e.y-e.h/2);
    return dx<e.w/2+3&&dy<e.h/2+6;
  }
  _onEnemyKilled(e){
    sfxStomp();
    spawnParts(e.x+e.w/2,e.y+e.h/2,12,'#FF6B6B',.5);
    this.killCount++;
    if(!this.bossActive&&this.killCount>=this.killsPerDrop&&this.col<4){
      this.killCount=0;
      var ti=this.col;
      this.drops.push(new L2TreasureDrop(e.x+e.w/2-23,e.y+e.h/2-23,ti,T2[ti]));
    }
    if(e.type==='boss'){
      this.bossDefeated=true;
      this.msg='BOSS击败！';this.msgT=3;
      sfxWin();
      spawnParts(e.x+e.w/2,e.y+e.h/2,45,'#FFD700',1.5);
      shake(.3,8);
    }
  }
  _checkPlayerHit(b){
    if(!b.isEnemy||this.player.inv>0)return;
    var dx=Math.abs(b.x-this.player.x-this.player.w/2);
    var dy=Math.abs(b.y-this.player.y-this.player.h/2);
    if(dx<this.player.w/2+3&&dy<this.player.h/2+4){
      b.y=999;
      this.player.hp--;
      this.player.inv=1.5;
      sfxHit();
      spawnParts(this.player.x+this.player.w/2,this.player.y+this.player.h/2,6,'#E74C3C',.4);
    }
  }
  update(dt){
    if(this.done)return;
    if(this.player.hp<=0||this.player.y<-30){this._reset();return}
    // movement
    var dx=(keys['d']||keys['arrowright']?1:0)-(keys['a']||keys['arrowleft']?1:0);
    var dy=(keys['s']||keys['arrowdown']?1:0)-(keys['w']||keys['arrowup']?1:0);
    if(dx||dy){var l=Math.sqrt(dx*dx+dy*dy);this.player.x+=dx/l*this.player.speed*dt;this.player.y+=dy/l*this.player.speed*dt}
    this.player.x=clamp(this.player.x,8,W-8-this.player.w);
    this.player.y=clamp(this.player.y,35,H-8-this.player.h);
    if(this.player.inv>0)this.player.inv-=dt;
    // Ability timer
    if(this.player.abilityTimer>0){this.player.abilityTimer-=dt;if(this.player.abilityTimer<=0){this.player.ability=null;this.player.abilityTimer=0;this.player.fireMult=1;this.player.homing=false}}
    // auto-fire
    this.fireTimer-=dt;
    if(this.fireTimer<=0){
      this.fireTimer=.13/this.player.fireMult;
      if(this.player.homing){
        // Find closest enemy for homing
        let closest=null,cd=9999;
        for(const e of this.enemies){if(e.hp<=0)continue;const d=Math.hypot(e.x+e.w/2-this.player.x,e.y+e.h/2-this.player.y);if(d<cd){cd=d;closest=e}}
        if(closest){const dx=(closest.x+closest.w/2-this.player.x-this.player.w/2)/80,dy=(closest.y+closest.h/2-this.player.y)/80;this.bullets.push(new L2Bullet(this.player.x+this.player.w/2,this.player.y-4,dx*140,-420-dy*80,'#FF69B4'))}
      }else{
        this.bullets.push(new L2Bullet(this.player.x+this.player.w/2,this.player.y-4,0,-520,'#FFD700'));
      }
      if(this.player.fireMult>=2){
        this.bullets.push(new L2Bullet(this.player.x+2,this.player.y-2,-40,-500,'#FFD700'));
        this.bullets.push(new L2Bullet(this.player.x+this.player.w-2,this.player.y-2,40,-500,'#FFD700'));
      }
      if(this.player.fireMult>=3){
        this.bullets.push(new L2Bullet(this.player.x-4,this.player.y,0,-480,'#FFD700'));
        this.bullets.push(new L2Bullet(this.player.x+this.player.w+4,this.player.y,0,-480,'#FFD700'));
      }
      if(this.bossActive&&this.player.fireMult===1){
        this.bullets.push(new L2Bullet(this.player.x+2,this.player.y-2,0,-500,'#FFD700'));
        this.bullets.push(new L2Bullet(this.player.x+this.player.w-2,this.player.y-2,0,-500,'#FFD700'));
      }
    }
    // spawn enemies
    if(!this.bossActive&&!this.bossDefeated){
      if(this.waveSpawned<this.waveEnemies){
        this.spawnCD-=dt;
        if(this.spawnCD<=0){this.spawnCD=.3+Math.random()*.7;this._spawnEnemy()}
      }else if(this.enemies.length===0){
        this.wave++;this.waveEnemies=Math.min(15,5+(this.wave-1)*2);
        this.waveSpawned=0;this.msg='第 '+this.wave+' 波！准备迎战！';this.msgT=1.5;
      }
    }
    // trigger boss
    if(this.col>=4&&!this.bossActive&&!this.bossDefeated&&this.enemies.length===0){
      this.bossActive=true;
      this.enemies.push(new L2EnemyShip(W/2-18,-60,'boss'));
      this.msg='BOSS来袭！全力开火！';this.msgT=2.5;sfxWin();
    }
    // update bullets
    for(var b of this.bullets)b.update(dt);
    this.bullets=this.bullets.filter(function(b){return b.alive});
    // combat - enemy bullets hit enemies
    for(var e of this.enemies){
      if(e.hp<=0)continue;
      e.update(dt,this.bullets);
      for(var b of this.bullets){
        if(!b.isEnemy&&this._checkBulletHit(e,b)){
          e.hp--;b.y=-99;
          if(e.hp<=0)this._onEnemyKilled(e);
          break;
        }
      }
      for(var b2 of this.bullets)this._checkPlayerHit(b2);
      if(this.player.inv<=0&&this.player.x+this.player.w>e.x&&this.player.x<e.x+e.w&&
         this.player.y+this.player.h>e.y&&this.player.y<e.y+e.h){
        this.player.hp--;this.player.inv=1.5;sfxHit();
        spawnParts(this.player.x+this.player.w/2,this.player.y+this.player.h/2,8,'#E74C3C',.5);
      }
    }
    this.enemies=this.enemies.filter(function(e){return e.alive&&e.hp>0});
    if(!this.done&&this.bossActive&&this.bossDefeated&&this.enemies.length===0){
      this.done=true;this.msg='全部宝物收集！三旺价值观圆满！';this.msgT=3;
    }
    // drops
    for(var d of this.drops){
      d.update(dt);
      if(!d.collected&&!this.tc[d.idx]&&d.life>0&&
         this.player.x+this.player.w>d.x&&this.player.x<d.x+d.w&&
         this.player.y+this.player.h>d.y&&this.player.y<d.y+d.h){
        d.collected=true;this.tc[d.idx]=true;this.col++;
        this.msg='获得宝物：'+d.data.name+'！'+this._getAbilityMsg(d.data.name);this.msgT=2.5;
        this._activateL2Ability(d.data.name);
        sfxCollect();spawnParts(d.x+13,d.y+13,28,d.data.color,1.2);
      }
    }
    this.drops=this.drops.filter(function(d){return d.life>0&&(!d.collected||d.anim<1)});
    for(var p of parts)p.update(dt);
    parts=parts.filter(function(p){return p.alive});
    updShake(dt);
    if(this.msgT>0)this.msgT-=dt;
  }
  draw(ctx){
    const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#03031A');bg.addColorStop(.4,'#080830');bg.addColorStop(1,'#040825');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    for(const s of this.bgStars){s.y+=s.s*70*0.016;if(s.y>H+5){s.y=-5;s.x=Math.random()*W}ctx.fillStyle=`rgba(255,255,255,${s.a})`;ctx.beginPath();ctx.arc(s.x,s.y,s.s*.5,0,Math.PI*2);ctx.fill()}
    ctx.strokeStyle='rgba(80,120,255,.03)';ctx.lineWidth=1;for(let y=(this.bgStars[0]?.y%50)||0;y<H;y+=50){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}

    // Top-down detailed draw

    hg.addColorStop(0,'#6BB2F0');hg.addColorStop(.5,'#4A90D9');hg.addColorStop(1,'#2962AF');
    ctx.fillStyle=hg;ctx.beginPath();ctx.arc(0,-3,14,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#1A4A8A';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,-3,14,0,Math.PI*2);ctx.stroke();

    ctx.fillStyle='#1B3A5C';ctx.beginPath();ctx.arc(-4,-4.5,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(4,-4.5,2.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,150,170,.35)';ctx.beginPath();ctx.ellipse(-6,-2,2.5,1.5,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(6,-2,2.5,1.5,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#2962AF';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,-16);ctx.quadraticCurveTo(2,-22,1,-24);ctx.stroke();
    ctx.fillStyle='#80D4FF';ctx.beginPath();ctx.arc(1,-24,3,0,Math.PI*2);ctx.fill();

    pb.addColorStop(0,'#5BA0E8');pb.addColorStop(.5,'#3D7CC6');pb.addColorStop(1,'#2962AF');
    ctx.fillStyle=pb;ctx.beginPath();ctx.ellipse(0,10,14,11,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#1A4A8A';ctx.lineWidth=1.5;ctx.beginPath();ctx.ellipse(0,10,14,11,0,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='#2962AF';ctx.beginPath();ctx.moveTo(-17,6);ctx.lineTo(-14,0);ctx.lineTo(-14,12);ctx.fill();ctx.beginPath();ctx.moveTo(17,6);ctx.lineTo(14,0);ctx.lineTo(12,12);ctx.fill();
    for(let i=0;i<4;i++){const pp=-5+i*3.3;ctx.fillStyle='#37474F';ctx.beginPath();ctx.roundRect(pp,8,3,3.5,1);ctx.fill();ctx.fillStyle='#1A1A2E';ctx.beginPath();ctx.roundRect(pp+.3,8.3,2.4,2.9,.6);ctx.fill();ctx.fillStyle='#FFD700';for(let j=0;j<4;j++)ctx.fillRect(pp+.5,8.8+j*.7,1.5,.3)}
    ctx.restore();

    for(const p of parts){ctx.fillStyle=p.color;ctx.globalAlpha=p.alpha;ctx.beginPath();ctx.arc(p.x+shakeX,p.y,p.size,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}
    if(this.player.hp<=0){ctx.fillStyle='rgba(0,0,0,.8)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#E74C3C';ctx.font='bold 34px "Noto Sans SC"';ctx.textAlign='center';ctx.fillText('战机坠毁',W/2,H/2-10);ctx.fillStyle='#FFF';ctx.font='15px "Noto Sans SC"';ctx.fillText('正在重新出击...',W/2,H/2+22)}
    this._hud(ctx);
  }

    const hr=clamp(this.player.hp/this.player.maxHp,0,1),hc=hr>.5?'#58D854':hr>.25?'#FCA044':'#E74C3C';

    if(this.msgT>0){const a=Math.min(1,this.msgT*2);ctx.fillStyle=`rgba(0,0,0,${a*.85})`;const mw=ctx.measureText(this.msg).width+40;ctx.fillRect(W/2-mw/2,H-75,mw,35);ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.font='bold 13px "Noto Sans SC"';ctx.textAlign='center';ctx.fillText(this.msg,W/2,H-50)}
    ctx.fillStyle='rgba(255,255,255,.5)';ctx.font='10px "Noto Sans SC"';ctx.textAlign='left';ctx.fillText('摇杆移动 | 自动射击 | 消灭敌人收集宝物',18,H-25);

    if(p2.ability){const abNames={homing:'🎯 追踪弹幕',rapid:'🔥 急速射',spread:'💥 散射',bomb:'💣 全屏爆破'};const abColors={homing:'#CE93D8',rapid:'#FFB74D',spread:'#4DD0E1',bomb:'#EF5350'};const abName=abNames[p2.ability]||'';const abCol=abColors[p2.ability]||'#FFF';const dur=p2.abilityTimer;ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(W/2-80,52,160,18);const pct=clamp(dur/8,0,1);ctx.fillStyle=abCol+'80';ctx.fillRect(W/2-76,55,152*pct,12);ctx.fillStyle='#FFF';ctx.font='bold 10px "Noto Sans SC"';ctx.textAlign='center';ctx.fillText(abName+' '+Math.ceil(dur)+'s',W/2,65)}
  }
  _activateL2Ability(name){
    const p=this.player;
    switch(name){
      case '主动担当':p.ability='homing';p.abilityTimer=8;p.homing=true;break;
      case '实干真做':p.ability='rapid';p.abilityTimer=8;p.fireMult=2;break;
      case '持续创新':p.ability='spread';p.abilityTimer=8;p.fireMult=3;break;
      case '结果导向':p.ability='bomb';p.abilityTimer=.5;
        // Screen clear bomb
        for(const e of this.enemies){if(e.hp>0){e.hp=0;this._onEnemyKilled(e)}}
        spawnParts(W/2,H/2,60,'#FFD700',1.2);sfxWin();shake(.4,12);break;
    }
  }
  _getAbilityMsg(name){
    const msgs={
      '主动担当':' 🎯 激活追踪弹幕！',
      '实干真做':' 🔥 激活急速射！',
      '持续创新':' 💥 激活散射！',
      '结果导向':' 💣 全屏爆破！'
    };
    return msgs[name]||' 获得能力！';
  }
}

  ctx.fillStyle='rgba(0,0,0,.88)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#FFD700';ctx.font='bold 40px "Noto Sans SC"';ctx.textAlign='center';ctx.fillText(lvl===1?'🎉 第一关完成！':'🎉 第二关完成！',W/2,95);

function drawWin(){
  const g=ctx.createRadialGradient(W/2,H/2,50,W/2,H/2,650);g.addColorStop(0,'#FCA044');g.addColorStop(.4,'#5C94FC');g.addColorStop(1,'#2A3A8A');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // Confetti ribbons — varied colors, shapes, rotations
  for(let i=0;i<80;i++){const pi=(i*7+gt*50)%(H+300)-200;const px=((Math.sin(i*1.7+gt*0.5*i%1.3)*.45+.5)*W);const py=pi;const cs=['#FFD700','#E74C3C','#58D854','#4FC3F7','#CE93D8','#FF8A65','#FCA044','#81C784','#FF69B4','#00CED1'];ctx.save();ctx.translate(px,py);ctx.rotate(Math.sin(gt*2+i*1.1)*.5);ctx.globalAlpha=.6+Math.sin(gt*3+i)*.2;ctx.fillStyle=cs[i%cs.length];if(i%3===0){ctx.fillRect(-6,-3,12,6);ctx.fillStyle='#FFF';ctx.fillRect(-3,-1,6,2)}else if(i%3===1){ctx.beginPath();ctx.arc(0,0,4+Math.sin(gt+i)*2,0,Math.PI*2);ctx.fill()}else{ctx.fillRect(-2,-6,4,12)}ctx.globalAlpha=1;ctx.restore()}
  ctx.fillStyle='#FFD700';ctx.font='bold 44px "Noto Sans SC"';ctx.textAlign='center';ctx.fillText('🏆 恭喜通关！',W/2,80);
  ctx.fillStyle='rgba(255,255,255,.9)';ctx.font='bold 18px "Noto Sans SC"';ctx.fillText('阿旺集齐了全部 8 个三旺文化价值观！',W/2,115);
  const at=[...T1,...T2];for(let i=0;i<8;i++){const t=at[i],c=i%4,r=Math.floor(i/4),x=W/2-230+c*150,y=185+r*65;ctx.fillStyle=t.color+'30';ctx.beginPath();ctx.roundRect(x-60,y-15,120,42,8);ctx.fill();ctx.fillStyle=t.color;ctx.beginPath();ctx.arc(x-37,y+6,12,0,Math.PI*2);ctx.fill();ctx.fillStyle='#FFF';ctx.font='bold 12px "Noto Sans SC"';ctx.textAlign='left';ctx.fillText('⭐ '+t.name,x-19,y+10);ctx.textAlign='center'}
  // New text: 预祝三旺通信早日年营收突破10亿
  ctx.fillStyle='#FFF';ctx.font='bold 22px "Noto Sans SC"';ctx.fillText('预祝三旺通信早日年营收突破',W/2,340);
  const rs=clamp((st-.5)/1,0,1);ctx.save();ctx.translate(W/2,395);ctx.scale(rs,rs);const ng=ctx.createRadialGradient(0,0,5,0,0,110);ng.addColorStop(0,'rgba(255,215,0,.6)');ng.addColorStop(1,'transparent');ctx.fillStyle=ng;ctx.beginPath();ctx.arc(0,0,110,0,Math.PI*2);ctx.fill();ctx.fillStyle='#FFD700';ctx.font='bold 72px "Noto Sans SC"';ctx.fillText('10 亿',0,0);ctx.restore();
  ctx.fillStyle='#FFF';ctx.font='bold 14px "Noto Sans SC"';ctx.fillText('🎯',W/2,432);
  // A-Wang celebrating — front view with dance
  const danceY=Math.sin(gt*6)*18;const danceR=Math.sin(gt*4)*.1;

  // Add extra celebration particles around A-Wang

  for(let i=0;i<5;i++){const a=gt*3+i*1.26,dd=20+Math.sin(gt*2+i)*8;ctx.fillStyle=['#FFD700','#FF69B4','#4FC3F7','#81C784','#CE93D8'][i];ctx.globalAlpha=.6+Math.sin(gt*5+i)*.2;ctx.beginPath();ctx.arc(W/2+Math.cos(a)*dd,460+Math.sin(a*1.3)*dd,4,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}
  const pa=.5+Math.sin(gt*3)*.5;ctx.fillStyle=`rgba(255,255,255,${pa})`;ctx.font='bold 16px "Noto Sans SC"';ctx.fillText('按 空格键 重新开始冒险',W/2,555);
  ctx.fillStyle='rgba(255,255,255,.5)';ctx.font='12px "Noto Sans SC"';ctx.fillText('3onedata 三旺通信 — 连接无限可能',W/2,580);

// ════════════════════════════════
//  GAME LOOP
// ════════════════════════════════
let l1=null,l2=null,lt=performance.now();
function startL1(){shakeT=0;l1=new Level1();gs=S.L1;st=0;ta=1}
function startL2(){shakeT=0;l2=new Level2();gs=S.L2;st=0;ta=1}

function loop(ts){
  requestAnimationFrame(loop);
  let dt=(ts-lt)/1000;if(dt<=0||dt>.1)dt=.016;lt=ts;gt+=dt;
  try{
  ctx.clearRect(0,0,W,H);
  if(ta>0)ta=Math.max(0,ta-dt*2.5);
  switch(gs){
    case S.MENU:st+=dt;drawMenu();if((keys[' ']||keys['enter'])&&ta<=0){sfxClick();gs=S.L1_INTRO;st=0;ta=1;keys[' ']=false;keys['enter']=false}break;
    case S.L1_INTRO:st+=dt;drawIntro(1,T1);if((keys[' ']||keys['enter'])&&ta<=0){sfxClick();startL1();keys[' ']=false;keys['enter']=false}break;
    case S.L1:l1.update(dt);l1.draw(ctx);if(l1.done){gs=S.L1_DONE;st=0;ta=1;sfxWin()}break;
    case S.L1_DONE:st+=dt;drawComplete(1,T1);if((keys[' ']||keys['enter'])&&ta<=0){sfxClick();gs=S.L2_INTRO;st=0;ta=1;keys[' ']=false;keys['enter']=false}break;
    case S.L2_INTRO:st+=dt;drawIntro(2,T2);if((keys[' ']||keys['enter'])&&ta<=0){sfxClick();startL2();keys[' ']=false;keys['enter']=false}break;
    case S.L2:l2.update(dt);l2.draw(ctx);if(l2.done){gs=S.L2_DONE;st=0;ta=1;sfxWin()}break;
    case S.L2_DONE:st+=dt;drawComplete(2,T2);if((keys[' ']||keys['enter'])&&ta<=0){sfxClick();gs=S.WIN;st=0;ta=1;keys[' ']=false;keys['enter']=false}break;
    case S.WIN:st+=dt;drawWin();if((keys[' ']||keys['enter'])&&ta<=0){sfxClick();gs=S.MENU;st=0;ta=1;keys[' ']=false;keys['enter']=false}break;
  }
  if(ta>0){ctx.fillStyle=`rgba(0,0,0,${ta})`;ctx.fillRect(0,0,W,H)}
  }catch(e){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);ctx.fillStyle='#E74C3C';ctx.font='16px "Noto Sans SC"';ctx.textAlign='center';ctx.fillText('Error: '+e.message,W/2,H/2);console.error(e)}
}

canvas.addEventListener('click',()=>{keys[' ']=true;setTimeout(()=>keys[' ']=false,100)});
// Polyfills
if(!ctx.roundRect){ctx.roundRect=function(x,y,w,h,r){if(typeof r==='number')r={tl:r,tr:r,br:r,bl:r};ctx.beginPath();ctx.moveTo(x+r.tl,y);ctx.lineTo(x+w-r.tr,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r.tr);ctx.lineTo(x+w,y+h-r.br);ctx.quadraticCurveTo(x+w,y+h,x+w-r.br,y+h);ctx.lineTo(x+r.bl,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r.bl);ctx.lineTo(x,y+r.tl);ctx.quadraticCurveTo(x,y,x+r.tl,y);ctx.closePath()}}
if(!ctx.ellipse){ctx.ellipse=function(x,y,rx,ry,rot,sa,ea,ccw){ctx.save();ctx.translate(x,y);ctx.rotate(rot);ctx.scale(rx,ry);ctx.arc(0,0,1,sa,ea,ccw);ctx.restore()}}
// Initialize and start
ta=0.01; // Start with minimal fade instead of full black
lt=performance.now();requestAnimationFrame(loop);
console.log('🎮 阿旺的价值观之旅 v5.1 — PC+移动端双端支持');
</script>
